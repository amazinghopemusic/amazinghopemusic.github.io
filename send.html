<!DOCTYPE html>
<html>
<head>
  <title>Send Push Message</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; max-width: 500px; margin: 40px auto; }
    input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
    button { padding: 12px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>

  <h2>Send Push Notification</h2>

  <label>Device Token</label>
  <textarea id="token" rows="3"></textarea>

  <label>Title</label>
  <input id="title" type="text">

  <label>Body</label>
  <textarea id="body" rows="3"></textarea>

  <button onclick="sendMessage()">Send Notification</button>

  <p id="status"></p>

  <script>
    async function sendMessage() {
      const token = document.getElementById("token").value;
      const title = document.getElementById("title").value;
      const body = document.getElementById("body").value;

      const response = await fetch("https://harrisondano.pythonanywhere.com/webpush", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, title, body })
      });

      const result = await response.text();
      document.getElementById("status").innerText = result;
    }
  </script>

</body>
</html>
