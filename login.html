<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; max-width: 400px; margin: 40px auto; }
    input { width: 100%; padding: 10px; margin: 10px 0; }
    button { padding: 12px; width: 100%; background: #007bff; color: white; border: none; }
  </style>
</head>
<body>

  <h2>Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="status"></p>

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const response = await fetch("http://amazinghopechurch.org:81/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const result = await response.json();

      if (result.token) {
        localStorage.setItem("authToken", result.token);
        document.getElementById("status").innerText = "Login successful!";
        window.location.href = "dashboard.html"; // redirect
      } else {
        document.getElementById("status").innerText = "Invalid login";
      }
    }
  </script>

</body>
</html>
