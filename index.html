<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }
        header {
            background: #2d3a4b;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        nav {
            background: #fff;
            padding: 1rem;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: #2d3a4b;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }
        .card {
            background: #f9fafb;
            border-radius: 6px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
            text-align: center;
        }
        .card h2 {
            margin: 0 0 1rem 0;
            font-size: 1.2rem;
            color: #2d3a4b;
        }
        .card p {
            color: #555;
            font-size: 1rem;
        }
        footer {
            background: #2d3a4b;
            color: #fff;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Dashboard</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
        <a href="#">Profile</a>
        <a href="/notification.html">Notifications</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
    <div class="container">
        <div class="dashboard-grid">
            <div class="card">
                <h2>Users</h2>
                <p>1,234 Active</p>
            </div>
            <div class="card">
                <h2>Sales</h2>
                <p>$12,345 Today</p>
            </div>
            <div class="card">
                <h2>Notifications</h2>
                <p>5 New Alerts</p>
            </div>
            <div class="card">
                <h2>Tasks</h2>
                <p>8 Pending</p>
            </div>
        </div>
    </div>
    <footer>
        &copy; 2026 Amazing Hope Music
    </footer>
    <script>
        const token = localStorage.getItem("authToken");
        if (!token) {
        window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem("authToken");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
